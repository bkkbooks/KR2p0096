body:
  text: 馬王堆漢墓帛書胎産書釋文禹問幼頻曰我欲埴人産子何如而有幼頻合曰月朔已去汁三日中從之有子其一日南其二日女殹故人之産殹入於冥冥出於冥冥乃始為人一月名曰留刑食飲必精酸羹必熟毋食辛星是謂財貞二月始膏毋食辛臊居處必靜男子勿勞百節皆病是胃始臧三月始脂果隋宵效當是之時未有定義見物而化是故君公大人毋使朱儒不觀木候不食薑不食兔羹欲産男置弧矢雄雉乘牡馬觀牡虎欲産女佩蠶耳呻朱子是謂內象成子四月而水受之乃始成血其食稻麥魚以清血而明目五月而火受之乃始成氣晏起沐厚衣居堂朝吸天光辟寒央其食稻麥其羹牛羊和以茱臾毋食以養氣六月而金受之乃始成筋勞出游於野數觀走犬馬必食殹未是胃變奏筋七月而木受之乃始成骨居燥處毋使定止飲食辟寒美齒八月而土受之乃始成膚革是胃密腠理九月而石授之乃始成豪毛司之十月氣陳以為凡治字者以清水包一曰必孰灑胞有以酒小以瓦甌毋令蟲蛾能入而毋見日所使嬰兒毋疕曼理壽一曰貍包席下不疕騷內中以建日飲字而多男毋女者而欲女後包貍陰垣下多女毋男亦反胞貍陽垣下一曰以甗衣約包貍之懷子者為享白牡狗首令獨食之其子美皙有易出欲令子徑者時食母馬肉懷子未出三月者呻爵罋二其子男殹一曰取爵罋中蟲青北者三産呻之必産男萬全一曰以方苴時取蒿牡卑稍三冶飲之必産男已試一曰遺弱半升堅而少汁一曰取逢房中子狗陰乾而冶之以飲懷子懷子産男一曰鮮魚食之乾冶之殳酒中懷子者産三月不可以令産男一曰取烏男子獨食肉汁女子席欲産女取烏雌雞煮令女子獨食肉汁席求子之道曰求九宗之草而夫妻共以為酒飲之字者且垂字先取市土濡請者之方三四尺高三四寸子既産置土上勿庸令嬰兒上其身盡得土乃浴之為徑有力字者已即燔其蓐置水中嬰兒不疕騷及取嬰兒所已浴者水半杯飲母母亦毋餘病女子鮮子者産令它人抱其以去濯其包以新布裹之為三約以斂之入中令其母自操入溪谷之三置去歸勿顧即令它人善貍之
